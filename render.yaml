services:
  - type: web
    name: pitstop
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/auth/providers
    disk:
      name: uploads
      mountPath: /var/data/uploads
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pitstop-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /var/data/uploads

databases:
  - name: pitstop-db
    plan: starter
    databaseName: pitstop
